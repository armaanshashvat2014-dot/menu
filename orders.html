<!DOCTYPE html>
<html>
<head>
<title>Agent Panel</title>

<style>
body { font-family:Poppins; background:#020617; color:white; margin:0; }

.login {
  display:flex; justify-content:center; align-items:center;
  height:100vh;
}

.box {
  background:#111; padding:20px; border-radius:10px; text-align:center;
}

.order {
  background:#111; margin:10px; padding:10px; border-radius:10px;
}

button { padding:8px; margin:5px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <div class="box">
    <h2>🚚 Agent Login</h2>
    <input id="agentName" placeholder="Enter your name"><br>
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">
  <h2 style="text-align:center;">📦 Your Orders</h2>
  <div id="list"></div>
</div>

<script>
let currentAgent = "";

function login() {
  const name = document.getElementById("agentName").value;

  if (!name) return alert("Enter name");

  const agents = JSON.parse(localStorage.getItem("agents")) || [];

  if (!agents.includes(name)) {
    alert("Agent not found ❌");
    return;
  }

  currentAgent = name;
  localStorage.setItem("loggedAgent", name);

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("panel").style.display = "block";

  load();
}

// auto login if already saved
window.onload = () => {
  const saved = localStorage.getItem("loggedAgent");
  if (saved) {
    currentAgent = saved;
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("panel").style.display = "block";
    load();
  }
};

function load() {
  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  let list = document.getElementById("list");
  list.innerHTML = "";

  // 🔥 FILTER ONLY THIS AGENT
  const myOrders = orders.filter(o => o.assignedTo === currentAgent);

  if (myOrders.length === 0) {
    list.innerHTML = "<p style='text-align:center;'>No orders assigned.</p>";
    return;
  }

  myOrders.forEach((o, i) => {
    list.innerHTML += `
    <div class="order">
      <h3>${o.food}</h3>
      <p>${o.name} (${o.phone})</p>
      <p>Qty: ${o.quantity}</p>
      <p>Combo: ${o.combo}</p>
      <p>Total: ${o.total}</p>
      <p>Status: ${o.status}</p>

      <button onclick="out(${i})">Out</button>
      <button onclick="done(${i})">Delivered</button>
    </div>`;
  });
}

function out(i) {
  let orders = JSON.parse(localStorage.getItem("orders"));

  const realIndex = orders.findIndex(o =>
    o.assignedTo === currentAgent &&
    o.food === document.querySelectorAll(".order h3")[i].innerText
  );

  orders[realIndex].status = "Out for Delivery";

  localStorage.setItem("orders", JSON.stringify(orders));
  load();
}

function done(i) {
  let orders = JSON.parse(localStorage.getItem("orders"));

  const realIndex = orders.findIndex(o =>
    o.assignedTo === currentAgent &&
    o.food === document.querySelectorAll(".order h3")[i].innerText
  );

  const otp = prompt("Enter OTP:");

  if (+otp === orders[realIndex].otp) {
    orders[realIndex].status = "Delivered";
    alert("Delivered ✅");
  } else {
    alert("Wrong OTP ❌");
  }

  localStorage.setItem("orders", JSON.stringify(orders));
  load();
}
</script>

</body>
</html>
