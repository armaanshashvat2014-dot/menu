<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Orders</title>

<style>
body { font-family: Poppins; background:#020617; color:white; margin:0; }
.header { text-align:center; padding:20px; background:#0f172a; }
.container { padding:20px; }

.order {
  background:rgba(255,255,255,0.08);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

button {
  margin-top:8px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.out { background:#facc15; }
.delivered { background:#22c55e; }
</style>
</head>

<body>

<div class="header">🚚 Delivery Panel</div>
<div class="container" id="ordersList"></div>

<script>
function loadOrders() {
  const orders = JSON.parse(localStorage.getItem("orders")) || [];
  const container = document.getElementById("ordersList");
  container.innerHTML = "";

  if (orders.length === 0) {
    container.innerHTML = "<p>No orders yet.</p>";
    return;
  }

  orders.forEach((order, index) => {
    const div = document.createElement("div");
    div.className = "order";

    // Safe fallback (in case old orders don't have fields)
    const combo = order.combo || "None";
    const total = order.total || "₹0";
    const qty = order.quantity || 1;

    div.innerHTML = `
      <h3>${order.food}</h3>
      <p><b>Name:</b> ${order.name}</p>
      <p><b>Phone:</b> ${order.phone}</p>
      <p><b>Quantity:</b> ${qty}</p>
      <p><b>Combo:</b> ${combo}</p>
      <p><b>Total:</b> ${total}</p>
      <p><b>Status:</b> ${order.status}</p>

      <button class="out" onclick="markOut(${index})">Out for Delivery</button>
      <button class="delivered" onclick="deliver(${index})">Delivered</button>
    `;

    container.appendChild(div);
  });
}

function markOut(i) {
  let orders = JSON.parse(localStorage.getItem("orders"));
  orders[i].status = "Out for Delivery";
  localStorage.setItem("orders", JSON.stringify(orders));
  loadOrders();
}

function deliver(i) {
  let orders = JSON.parse(localStorage.getItem("orders"));
  const entered = prompt("Enter OTP from customer:");

  if (parseInt(entered) === orders[i].otp) {
    orders[i].status = "Delivered";
    localStorage.setItem("orders", JSON.stringify(orders));
    alert("Delivery confirmed ✅");
  } else {
    alert("Wrong OTP ❌");
  }

  loadOrders();
}

loadOrders();
</script>

</body>
</html>
