<!DOCTYPE html>
<html>
<head>
<title>Agent Panel</title>

<style>
body { font-family:Poppins; background:#020617; color:white; text-align:center; }
.order { background:#111; margin:10px; padding:10px; border-radius:10px; }
</style>
</head>

<body>

<h2>🚚 Agent Panel</h2>

<select id="agentSelect"></select>
<button onclick="login()">Login</button>

<h3 id="earnings">💰 Earnings: ₹0</h3>

<div id="orders"></div>

<script>
let currentAgent="";

function loadAgents(){
  let agents=JSON.parse(localStorage.getItem("agents"))||[];
  document.getElementById("agentSelect").innerHTML =
    agents.map(a=>`<option>${a}</option>`).join("");
}

function login(){
  currentAgent=document.getElementById("agentSelect").value;
  localStorage.setItem("loggedAgent",currentAgent);
  loadOrders();
}

function loadOrders(){
  let orders=JSON.parse(localStorage.getItem("orders"))||[];
  let div=document.getElementById("orders");

  let myOrders=orders.filter(o=>o.assignedTo===currentAgent);

  div.innerHTML = myOrders.length===0 ? "<p>No orders</p>" :
    myOrders.map(o=>`
      <div class="order">
        <h3>${o.food}</h3>
        <p>${o.name}</p>
        <p>${o.total}</p>
        <p>Status: ${o.status}</p>

        <button onclick="out(${o.id})">Out</button>
        <button onclick="done(${o.id})">Delivered</button>
      </div>
    `).join("");

  updateEarnings();
}

function updateOrder(id, fn){
  let orders=JSON.parse(localStorage.getItem("orders"))||[];
  let i=orders.findIndex(o=>o.id===id);
  if(i===-1) return;
  fn(orders[i], orders, i);
  localStorage.setItem("orders",JSON.stringify(orders));
}

function out(id){
  updateOrder(id, o=>o.status="Out for Delivery");
  loadOrders();
}

function done(id){
  let orders=JSON.parse(localStorage.getItem("orders"))||[];
  let i=orders.findIndex(o=>o.id===id);
  if(i===-1) return;

  let otp=prompt("Enter OTP:");

  if(+otp===orders[i].otp){
    alert("Delivered ✅");

    // 🔥 move to history
    let history=JSON.parse(localStorage.getItem("history"))||[];
    history.push(orders[i]);
    localStorage.setItem("history",JSON.stringify(history));

    // 💰 add earnings
    let total=parseInt(orders[i].total.replace("₹",""));
    let earnings=+localStorage.getItem("earnings")||0;
    localStorage.setItem("earnings",earnings+total);

    // ❌ remove order
    orders.splice(i,1);
    localStorage.setItem("orders",JSON.stringify(orders));
  } else {
    alert("Wrong OTP");
  }

  loadOrders();
}

function updateEarnings(){
  let e=localStorage.getItem("earnings")||0;
  document.getElementById("earnings").innerText="💰 Earnings: ₹"+e;
}

window.onload=()=>{
  loadAgents();
  let saved=localStorage.getItem("loggedAgent");
  if(saved){
    currentAgent=saved;
    document.getElementById("agentSelect").value=saved;
    loadOrders();
  }
};
</script>

</body>
</html>
