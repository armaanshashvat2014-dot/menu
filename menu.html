<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Menu</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: white;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
}

.menu-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  overflow: hidden;
  text-align: center;
  backdrop-filter: blur(10px);
  transition: transform 0.3s ease;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card h3 {
  margin: 10px 0 5px;
}

.card p {
  font-size: 14px;
  padding: 0 10px 15px;
}
</style>

</head>

<body>

<div class="header">🍽️ Our Menu</div>

<div class="menu-container">

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?burger" alt="Burger">
    <h3>Burger</h3>
    <p>Juicy grilled burger with fresh veggies.</p>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?pizza" alt="Pizza">
    <h3>Pizza</h3>
    <p>Cheesy delight loaded with toppings.</p>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?pasta" alt="Pasta">
    <h3>Pasta</h3>
    <p>Creamy Italian pasta cooked to perfection.</p>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?sandwich" alt="Sandwich">
    <h3>Sandwich</h3>
    <p>Freshly made sandwich with crispy fillings.</p>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?dessert" alt="Dessert">
    <h3>Dessert</h3>
    <p>Sweet treats to complete your meal.</p>
  </div>

</div>

</body>
</html>
