<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Menu</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: white;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
}

.menu-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.12);
  border-radius: 15px;
  overflow: hidden;
  text-align: center;
  backdrop-filter: blur(10px);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card h3 {
  margin: 10px 0 5px;
}

.card p {
  font-size: 14px;
  padding: 0 10px 15px;
  opacity: 0.9;
}
</style>

</head>

<body>

<div class="header">🍽️ Our Menu</div>

<div class="menu-container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=800&q=80" alt="Burger">
    <h3>Burger</h3>
    <p>Juicy grilled burger with fresh veggies.</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1601924582975-7e7e1c1c6b4d?auto=format&fit=crop&w=800&q=80" alt="Pizza">
    <h3>Pizza</h3>
    <p>Cheesy delight loaded with toppings.</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1523986371872-9d3ba2e2f642?auto=format&fit=crop&w=800&q=80" alt="Pasta">
    <h3>Pasta</h3>
    <p>Creamy Italian pasta cooked to perfection.</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1528731708534-816fe59f90b5?auto=format&fit=crop&w=800&q=80" alt="Sandwich">
    <h3>Sandwich</h3>
    <p>Freshly made sandwich with crispy fillings.</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=800&q=80" alt="Dessert">
    <h3>Dessert</h3>
    <p>Sweet treats to complete your meal.</p>
  </div>

</div>

</body>
</html>
