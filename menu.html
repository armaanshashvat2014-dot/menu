<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PNB Luxury Salon & Spa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    overflow-x:hidden;
}

header{
    padding:40px 20px;
    text-align:center;
    background:linear-gradient(135deg,#111,#1f1f1f);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

header h1{
    font-size:3rem;
    color:#d4af37;
}

header p{
    color:#bbb;
    margin-top:10px;
}

.container{
    width:95%;
    max-width:1400px;
    margin:auto;
    padding:40px 0;
}

.category{
    margin-bottom:50px;
}

.category h2{
    font-size:2rem;
    color:#d4af37;
    margin-bottom:20px;
    border-left:5px solid #d4af37;
    padding-left:15px;
}

.services{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:#181818;
    border-radius:20px;
    padding:25px;
    transition:0.3s;
    border:1px solid rgba(255,255,255,0.08);
    position:relative;
    overflow:hidden;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 40px rgba(212,175,55,0.25);
}

.card h3{
    color:#fff;
    margin-bottom:10px;
    font-size:1.2rem;
}

.price{
    color:#d4af37;
    font-size:1.1rem;
    font-weight:600;
}

.duration{
    color:#aaa;
    margin-top:5px;
    font-size:0.9rem;
}

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
    z-index:1000;
}

.modal-content{
    background:#181818;
    width:100%;
    max-width:500px;
    border-radius:25px;
    padding:30px;
    position:relative;
    animation:popup 0.3s ease;
}

@keyframes popup{
    from{
        transform:scale(0.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.close{
    position:absolute;
    top:15px;
    right:20px;
    font-size:1.5rem;
    cursor:pointer;
    color:#fff;
}

.modal-content h2{
    color:#d4af37;
    margin-bottom:15px;
}

.modal-content p{
    color:#ccc;
    line-height:1.6;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#d4af37;
    color:#000;
    font-weight:700;
    cursor:pointer;
    font-size:1rem;
    transition:0.3s;
}

button:hover{
    background:white;
}

footer{
    text-align:center;
    padding:30px;
    color:#999;
    border-top:1px solid rgba(255,255,255,0.08);
    margin-top:40px;
}

@media(max-width:768px){
    header h1{
        font-size:2.2rem;
    }
}
</style>
</head>

<body>

    <p>Beauty • Wellness • Elegance</p>
</header>

<div class="container" id="menu"></div>

<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>
        <p class="price" id="modalPrice"></p>
        <button onclick="orderService()">Book Now</button>

<footer>

const menu = document.getElementById("menu");

data.forEach(section => {

    const category = document.createElement("div");
    category.className = "category";

    category.innerHTML = `
        <h2>${section.category}</h2>
        <div class="services">
            ${section.items.map(item => `
                <div class="card"
                    onclick="openModal(
                        '${item[0]}',
                        '${item[1]}',
                        '${item[2]}'
                    )">

                    <h3>${item[0]}</h3>
                    <div class="price">${item[2]}</div>
                    <div class="duration">${item[1]}</div>

                </div>
            `).join("")}
        </div>
    `;

    menu.appendChild(category);

});

let selectedService = "";

window.openModal = function(title, desc, price){

    selectedService = title;

    document.getElementById("modalTitle").innerText = title;

    document.getElementById("modalDesc").innerText =
    desc || "Luxury professional salon service with premium care and expert beauticians.";

    document.getElementById("modalPrice").innerText = price;

    document.getElementById("modal").style.display = "flex";
}

window.closeModal = function(){
    document.getElementById("modal").style.display = "none";
}

window.orderService = async function(){

    try{

        await addDoc(collection(db,"orders"),{
            service:selectedService,
            createdAt:serverTimestamp()
        });

        alert("Booking Request Sent Successfully!");

    }catch(err){

        alert("Error: " + err);

    }

}

</script>
