<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Menu</title>

<style>
body { font-family:Poppins; background:orange; color:white; text-align:center; }
.menu { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; padding:20px; }
.card { background:#0003; padding:10px; border-radius:10px; cursor:pointer; }
.card img { width:100%; height:150px; object-fit:cover; }

.modal { display:none; position:fixed; inset:0; background:#0008; justify-content:center; align-items:center; }
.box { background:#222; padding:20px; border-radius:10px; }
</style>
</head>

<body>

<h2>🍽️ Menu</h2>

<div class="menu">
  <div class="card" onclick="openModal('Burger',120)"><img src="burger.gif"><h3>Burger</h3></div>
  <div class="card" onclick="openModal('Pizza',250)"><img src="pizza.gif"><h3>Pizza</h3></div>
  <div class="card" onclick="openModal('Pasta',180)"><img src="pasta.gif"><h3>Pasta</h3></div>
  <div class="card" onclick="openModal('Sandwich',100)"><img src="sandwich.gif"><h3>Sandwich</h3></div>
  <div class="card" onclick="openModal('Dessert',90)"><img src="desert.gif"><h3>Dessert</h3></div>
</div>

<div class="modal" id="modal">
  <div class="box">
    <h3 id="food"></h3>

    <input id="qty" type="number" value="1"><br>

    <select id="combo">
      <option value="0">No Combo</option>
      <option value="50">Fries + Coke</option>
      <option value="80">Full Combo</option>
    </select>

    <h3 id="total"></h3>

    <button onclick="buy()">Buy</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<a href="orders.html">Orders</a> |
<a href="agents.html">Agents</a>

<script>
let currentFood="", currentPrice=0;

function openModal(name,price){
  currentFood=name;
  currentPrice=price;
  document.getElementById("food").innerText=name;
  document.getElementById("modal").style.display="flex";
  updateTotal();
}

function closeModal(){ document.getElementById("modal").style.display="none"; }

document.getElementById("qty").oninput=updateTotal;
document.getElementById("combo").onchange=updateTotal;

function updateTotal(){
  let qty=+document.getElementById("qty").value;
  let combo=+document.getElementById("combo").value;
  document.getElementById("total").innerText="₹"+(qty*currentPrice+combo);
}

function generateOTP(){ return Math.floor(1000+Math.random()*9000); }

function assignAgent(){
  let agents=JSON.parse(localStorage.getItem("agents"))||[];
  let orders=JSON.parse(localStorage.getItem("orders"))||[];

  if(agents.length===0) return "unassigned";

  return agents[orders.length % agents.length]; // stable round-robin
}

function buy(){
  let name=prompt("Name:");
  let address=prompt("Address:");
  let phone=prompt("Phone:");

  if(!name||!address||!phone) return alert("Fill all fields");

  let orders=JSON.parse(localStorage.getItem("orders"))||[];
  if(orders.length>=10) orders.shift();

  let otp=generateOTP();

  orders.push({
    id: Date.now(), // UNIQUE ID (important fix)
    name, address, phone,
    food: currentFood,
    quantity: document.getElementById("qty").value,
    combo: document.getElementById("combo").selectedOptions[0].text,
    total: document.getElementById("total").innerText,
    status:"Pending",
    otp: otp,
    assignedTo: assignAgent()
  });

  localStorage.setItem("orders",JSON.stringify(orders));

  alert("Order placed! OTP: "+otp);
  closeModal();
}
</script>

</body>
</html>
